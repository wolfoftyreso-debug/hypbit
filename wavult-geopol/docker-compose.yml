# Production / self-hosted compose for Wavult Geopol
#
# This stack deploys ONLY the application services (client + server).
# Neo4j, Redis and OpenSearch are treated as EXTERNAL services and must
# be reachable via the env vars below (NEO4J_URI, REDIS_URL, OPENSEARCH_URL).
#
# For a local dev datastore stack, see docker-compose.dev.yml.

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: wavult-geopol-server:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      REDIS_URL: ${REDIS_URL}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: wavult-geopol-client:latest
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-8080}:8080"
