# Production / self-hosted compose for Wavult Geopol
#
# This stack deploys the application services only:
#   - apps/web               React + nginx frontend
#   - services/influence-api Fastify API
#   - services/enrichment-ai-core  Kafka consumer for async enrichment
#
# Neo4j, Redis, OpenSearch and Kafka are treated as EXTERNAL services
# and must be reachable via the env vars below. For a local dev stack
# that spins them up, see docker-compose.dev.yml.

services:
  influence-api:
    build:
      context: ./services/influence-api
      dockerfile: Dockerfile
    image: wavult-geopol-influence-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      REDIS_URL: ${REDIS_URL}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      OUR_NODE_ID: ${OUR_NODE_ID:-our_node}
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  enrichment-ai-core:
    build:
      context: ./services/enrichment-ai-core
      dockerfile: Dockerfile
    image: wavult-geopol-enrichment-ai-core:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_CLIENT_ID: enrichment-ai-core
      KAFKA_GROUP_ID: enrichment-ai-core

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: wavult-geopol-web:latest
    restart: unless-stopped
    depends_on:
      - influence-api
    ports:
      - "${WEB_PORT:-8080}:8080"
