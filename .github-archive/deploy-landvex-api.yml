name: Deploy Landvex API
on:
  push:
    branches: [main]
    paths:
      - 'apps/landvex-api/**'
      - '.github/workflows/deploy-landvex-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1
      - name: Build and push
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin 155407238699.dkr.ecr.eu-north-1.amazonaws.com
          cd apps/landvex-api
          npm ci
          npm run build
          docker build -t landvex-api .
          docker tag landvex-api:latest 155407238699.dkr.ecr.eu-north-1.amazonaws.com/landvex-api:latest
          docker push 155407238699.dkr.ecr.eu-north-1.amazonaws.com/landvex-api:latest
