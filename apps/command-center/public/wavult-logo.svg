<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wavult">
  <!--
    Wavult logotyp — primär (navy #0A3D62)
    Transparent bakgrund. Enfärgad. Vektoriserad.
    Varianter: wavult-logo-white.svg (vit), wavult-logo-black.svg (svart)
  -->
  <defs>
    <radialGradient id="glow-gold" cx="50%" cy="100%" r="35%">
      <stop offset="0%" stop-color="#E8B84B" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#E8B84B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Vänster vinge -->
  <path d="
    M 28,40
    C 10,50 0,80 8,118
    C 14,145 32,162 52,170
    C 60,173 70,174 76,172
    L 68,152
    C 58,154 46,148 38,134
    C 28,116 28,88 40,68
    C 46,58 55,50 64,46
    L 52,28
    C 42,30 34,34 28,40 Z
  " fill="#0A3D62"/>

  <!-- Höger vinge -->
  <path d="
    M 272,40
    C 290,50 300,80 292,118
    C 286,145 268,162 248,170
    C 240,173 230,174 224,172
    L 232,152
    C 242,154 254,148 262,134
    C 272,116 272,88 260,68
    C 254,58 245,50 236,46
    L 248,28
    C 258,30 266,34 272,40 Z
  " fill="#0A3D62"/>

  <!-- Central triangel (nedåtpekande) -->
  <path d="M 150,196 L 88,28 L 212,28 Z" fill="#0A3D62"/>

  <!-- Guldglöd vid spetsen -->
  <ellipse cx="150" cy="193" rx="20" ry="9" fill="url(#glow-gold)"/>
  <circle cx="150" cy="196" r="3" fill="#E8B84B"/>
</svg>
