name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'src/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECS_CLUSTER: hypbit
  ECS_SERVICE: hypbit-api

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.eu-north-1.amazonaws.com" >> $GITHUB_OUTPUT
          echo "AWS Account: $ACCOUNT_ID"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names hypbit/api --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws ecr create-repository --repository-name hypbit/api --region ${{ env.AWS_REGION }} --image-scanning-configuration scanOnPush=true
          echo "ECR repository ready"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        run: |
          ECR="${{ steps.account.outputs.ECR_REGISTRY }}"
          TAG="${{ github.sha }}"
          IMAGE="${ECR}/hypbit/api:${TAG}"
          LATEST="${ECR}/hypbit/api:latest"

          docker build -f Dockerfile -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Pushed: $IMAGE"

      - name: Check if ECS cluster exists
        id: ecs-check
        run: |
          if aws ecs describe-clusters --clusters ${{ env.ECS_CLUSTER }} --region ${{ env.AWS_REGION }} --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "ECS cluster exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ECS cluster does not exist yet — image pushed to ECR, run infra-setup workflow to create ECS"
          fi

      - name: Update ECS service
        if: steps.ecs-check.outputs.exists == 'true'
        run: |
          ECR="${{ steps.account.outputs.ECR_REGISTRY }}"
          TAG="${{ github.sha }}"
          NEW_IMAGE="${ECR}/hypbit/api:${TAG}"

          TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' \
            --output text)

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' \
            --output json | \
            python3 -c "
import sys, json
td = json.load(sys.stdin)
for c in td.get('containerDefinitions', []):
    c['image'] = '$NEW_IMAGE'
for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
    td.pop(k, None)
print(json.dumps(td))
")

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --region ${{ env.AWS_REGION }}

          echo "ECS service updated"

      - name: Deploy summary
        run: |
          echo "=== Deploy Summary ==="
          echo "Image: ${{ steps.build.outputs.image }}"
          echo "ECS Cluster exists: ${{ steps.ecs-check.outputs.exists }}"
          echo "SHA: ${{ github.sha }}"
