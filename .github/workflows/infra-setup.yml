name: Setup Infrastructure

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/infra-setup.yml'
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1

jobs:
  setup:
    name: Provision AWS Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Create Terraform state bucket
        run: |
          aws s3api head-bucket --bucket hypbit-terraform-state --region eu-north-1 2>/dev/null || \
            aws s3 mb s3://hypbit-terraform-state --region eu-north-1
          aws dynamodb describe-table --table-name hypbit-terraform-locks --region eu-north-1 2>/dev/null || \
            aws dynamodb create-table \
              --table-name hypbit-terraform-locks \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region eu-north-1

      - name: Create S3 buckets
        run: |
          for BUCKET in pixdrift-landing-prod pixdrift-bc-workstation-prod pixdrift-bc-admin-prod pixdrift-bc-crm-prod pixdrift-bc-sales-prod; do
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "$BUCKET exists"
            else
              aws s3 mb "s3://$BUCKET" --region eu-north-1
              if [ "$BUCKET" = "pixdrift-landing-prod" ]; then
                aws s3 website "s3://$BUCKET" --index-document index.html --error-document index.html
                aws s3api put-public-access-block --bucket "$BUCKET" \
                  --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false
                aws s3api put-bucket-policy --bucket "$BUCKET" --policy '{"Version":"2012-10-17","Statement":[{"Sid":"PublicRead","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::pixdrift-landing-prod/*"}]}'
              fi
              echo "Created $BUCKET"
            fi
          done

      - name: Create ECR repository
        run: |
          aws ecr describe-repositories --repository-names hypbit/api --region eu-north-1 2>/dev/null || \
            aws ecr create-repository --repository-name hypbit/api --region eu-north-1 --image-scanning-configuration scanOnPush=true

      - name: Summary
        run: |
          echo "=== Infrastructure Ready ==="
          echo "S3 Buckets:"
          aws s3 ls | grep pixdrift
          echo "ECR:"
          aws ecr describe-repositories --region eu-north-1 --query 'repositories[].repositoryUri' --output text
