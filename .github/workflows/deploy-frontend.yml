name: Deploy Frontends

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'turbo.json'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1

jobs:
  build-and-deploy:
    name: Build & Deploy Frontends
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build all frontends
        run: npx turbo build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure S3 buckets exist
        run: |
          for BUCKET in pixdrift-landing-prod pixdrift-bc-workstation-prod pixdrift-bc-admin-prod pixdrift-bc-crm-prod pixdrift-bc-sales-prod; do
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "OK $BUCKET"
            else
              echo "Creating $BUCKET..."
              aws s3 mb "s3://$BUCKET" --region eu-north-1
              if [ "$BUCKET" = "pixdrift-landing-prod" ]; then
                aws s3 website "s3://$BUCKET" --index-document index.html --error-document index.html
                aws s3api put-public-access-block --bucket "$BUCKET" \
                  --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false
                aws s3api put-bucket-policy --bucket "$BUCKET" --policy '{"Version":"2012-10-17","Statement":[{"Sid":"PublicRead","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::pixdrift-landing-prod/*"}]}'
              fi
              echo "Created $BUCKET"
            fi
          done

      - name: Deploy landing to S3
        run: |
          aws s3 sync apps/landing/ s3://pixdrift-landing-prod/ \
            --delete \
            --region ${{ env.AWS_REGION }} \
            --exclude "*.tsx" \
            --exclude "*.ts" \
            --exclude "node_modules/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "tsconfig.json" \
            --exclude "vite.config.*" \
            --cache-control "public,max-age=3600"
          aws s3 cp apps/landing/index.html s3://pixdrift-landing-prod/index.html \
            --region ${{ env.AWS_REGION }} \
            --cache-control "no-cache,no-store,must-revalidate" || true

      - name: Deploy workstation to S3
        run: |
          if [ -d "apps/workstation/dist" ]; then
            aws s3 sync apps/workstation/dist/ s3://pixdrift-bc-workstation-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/workstation/dist/index.html s3://pixdrift-bc-workstation-prod/index.html \
              --region ${{ env.AWS_REGION }} \
              --cache-control "no-cache,no-store,must-revalidate"
          else
            echo "No dist/ for workstation, skipping"
          fi

      - name: Deploy admin to S3
        run: |
          if [ -d "apps/admin/dist" ]; then
            aws s3 sync apps/admin/dist/ s3://pixdrift-bc-admin-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/admin/dist/index.html s3://pixdrift-bc-admin-prod/index.html \
              --region ${{ env.AWS_REGION }} \
              --cache-control "no-cache,no-store,must-revalidate"
          else
            echo "No dist/ for admin, skipping"
          fi

      - name: Deploy CRM to S3
        run: |
          if [ -d "apps/crm/dist" ]; then
            aws s3 sync apps/crm/dist/ s3://pixdrift-bc-crm-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/crm/dist/index.html s3://pixdrift-bc-crm-prod/index.html \
              --region ${{ env.AWS_REGION }} \
              --cache-control "no-cache,no-store,must-revalidate"
          else
            echo "No dist/ for crm, skipping"
          fi

      - name: Deploy sales to S3
        run: |
          if [ -d "apps/sales/dist" ]; then
            aws s3 sync apps/sales/dist/ s3://pixdrift-bc-sales-prod/ \
              --delete --region ${{ env.AWS_REGION }} \
              --cache-control "public,max-age=31536000,immutable" \
              --exclude "index.html"
            aws s3 cp apps/sales/dist/index.html s3://pixdrift-bc-sales-prod/index.html \
              --region ${{ env.AWS_REGION }} \
              --cache-control "no-cache,no-store,must-revalidate"
          else
            echo "No dist/ for sales, skipping"
          fi

      - name: Deploy summary
        run: |
          echo "=== Frontend Deploy Summary ==="
          for BUCKET in pixdrift-landing-prod pixdrift-bc-workstation-prod pixdrift-bc-admin-prod pixdrift-bc-crm-prod pixdrift-bc-sales-prod; do
            COUNT=$(aws s3 ls "s3://$BUCKET/" --recursive --region eu-north-1 2>/dev/null | wc -l || echo 0)
            echo "$BUCKET: $COUNT files"
          done
